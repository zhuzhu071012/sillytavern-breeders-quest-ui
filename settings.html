<div id="shendu-settings" class="ss-settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header"><b>神都世家 · 人生面板</b><div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div></div>
    <div class="inline-drawer-content">
      <label class="checkbox_label"><input id="ss-auto-open" type="checkbox"><span>检测到武周状态时自动打开</span></label>
      <label class="checkbox_label"><input id="ss-hide-blocks" type="checkbox"><span>隐藏消息中的状态协议块</span></label>
      <label class="checkbox_label"><input id="ss-prompt-reminder" type="checkbox"><span>每回合向模型注入上一份状态并要求更新</span></label>
      <label for="ss-accent">朱砂强调色</label><input id="ss-accent" type="color" value="#a83b32" aria-label="面板强调色">
      <div class="flex-container"><button id="ss-open-panel" class="menu_button">打开人生面板</button><button id="ss-retry-sync" class="menu_button">重试同步</button><button id="ss-copy-protocol" class="menu_button">复制状态协议</button></div>
      <small>扩展只读取当前聊天中的 &lt;wuzhou_state&gt; 数据，不发起网络请求；旧 &lt;breeder_state&gt; 存档仅作兼容显示。</small>
    </div>
  </div>
</div>
