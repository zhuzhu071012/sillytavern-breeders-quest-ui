<div id="bq-settings" class="bq-settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>王朝锻炉 · 冒险面板</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <label class="checkbox_label"><input id="bq-auto-open" type="checkbox"><span>进入对应角色聊天时自动打开</span></label>
      <label class="checkbox_label"><input id="bq-hide-blocks" type="checkbox"><span>隐藏消息中的状态协议块</span></label>
      <label for="bq-accent">强调色</label>
      <input id="bq-accent" type="color" value="#d69a55" aria-label="面板强调色">
      <div class="flex-container">
        <button id="bq-open-panel" class="menu_button">打开面板</button>
        <button id="bq-copy-prompt" class="menu_button">复制状态协议</button>
      </div>
      <small>此扩展只读取当前聊天中的 &lt;breeder_state&gt; 数据，不上传聊天内容。</small>
    </div>
  </div>
</div>
